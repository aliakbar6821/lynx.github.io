<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Port — Xia's Projekt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>

<style>
  .back-row{padding:18px 20px 0;}
  .cover-wrap{padding:18px 20px 0;}
  .cover-wrap .cover{border-radius:24px;}
  .detail-body{padding:22px 20px 6px;}
  .status-tag{display:inline-block; font-size:0.78rem; font-weight:700; letter-spacing:0.06em; padding:5px 0;}
  .status-tag.stable{color:var(--stable);}
  .status-tag.pre{color:var(--pre);}
  h1.title{font-size:2rem; font-weight:500; color:var(--on-surface); margin:4px 0 14px;}
  .description{color:var(--on-surface-var); font-size:0.98rem; max-width:60ch;}
  .actions{padding:22px 20px 4px; display:flex; flex-direction:column; gap:10px;}
  .actions .btn{width:100%; padding:15px;}
  .releases{padding:0 20px; display:flex; flex-direction:column; gap:16px;}
  .release-card{padding:20px;}
  .release-title{font-size:1.1rem; font-weight:500; color:var(--on-surface); margin-bottom:6px;}
  .release-meta{color:var(--on-surface-var); font-size:0.85rem; margin-bottom:14px;}
  .tag-row{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .tag{font-size:0.72rem; font-weight:600; letter-spacing:0.02em; padding:5px 12px; border-radius:10px;}
  .tag.STABLE{background:var(--stable-container); color:var(--stable);}
  .tag.PRE{background:var(--pre-container); color:var(--pre);}
  .tag.version{background:var(--surface-container-high); color:var(--on-surface-var);}
  .release-card .btn{width:100%; margin-bottom:10px;}
  .release-card .btn:last-child{margin-bottom:0;}
  .not-found{padding:60px 20px; text-align:center; color:var(--on-surface-var);}
  .not-found a{color:var(--primary); font-weight:600;}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Xia's Projekt</a>
  <div class="header-actions">
    <button class="icon-btn ripple" id="themeToggleBtn" onclick="toggleTheme()"></button>
    <a class="btn btn-filled ripple" href="#">Donate</a>
  </div>
</header>

<div id="content"></div>

<footer>Xia's Projekt · built on GitHub Pages</footer>

<script src="ports-data.js"></script>
<script src="theme.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const port = PORTS.find(p => p.id === params.get('id'));
  const content = document.getElementById('content');

  function icon(name){
    if(name === 'download'){
      return `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
    }
    if(name === 'link'){
      return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`;
    }
    if(name === 'back'){
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`;
    }
    return '';
  }

  function releaseGroup(title, releases){
    if(releases.length === 0) return '';
    const cards = releases.map(r => `
      <div class="card release-card">
        <div class="release-title">${r.title}</div>
        <div class="release-meta">${r.device} · ${r.android} · ${r.size} · Uploaded: ${r.uploaded}</div>
        <div class="tag-row">
          ${r.tags.map(t => `<span class="tag ${t === 'STABLE' || t === 'PRE' ? t : 'version'}">${t}</span>`).join('')}
        </div>
        <a class="btn btn-filled ripple" href="${r.downloadUrl}">${icon('download')} Download</a>
        ${r.mirrorUrl ? `<a class="btn btn-outlined ripple" href="${r.mirrorUrl}">${icon('link')} Mirror</a>` : ''}
      </div>
    `).join('');
    return `
      <div class="group-label">${title}<span class="rule"></span></div>
      <div class="releases">${cards}</div>
    `;
  }

  if(!port){
    content.innerHTML = `
      <div class="not-found">
        Port not found.<br><br>
        <a href="index.html">← Back to all ROMs</a>
      </div>
    `;
  } else {
    document.getElementById('pageTitle').textContent = `${port.name} - Xia's Projekt`;
    const latest = latestRelease(port);
    const stableReleases = port.releases.filter(r => r.channel === 'stable');
    const preReleases = port.releases.filter(r => r.channel === 'pre');

    content.innerHTML = `
      <div class="back-row">
        <a class="btn btn-tonal ripple" href="index.html">${icon('back')} Back</a>
      </div>

      <div class="cover-wrap">
        <div class="cover"><img src="${port.cover}" alt="${port.name}"></div>
      </div>

      <div class="detail-body">
        <span class="status-tag ${latest.channel}">${latest.channel === 'stable' ? 'STABLE' : 'PRE-RELEASE'}</span>
        <h1 class="title">${port.name}</h1>
        <p class="description">${port.description}</p>
      </div>

      <div class="actions">
        <a class="btn btn-filled ripple" href="${port.links.flash}">How to flash</a>
        <a class="btn btn-tonal ripple" href="${port.links.screenshots}">Screenshots</a>
        <a class="btn btn-tonal ripple" href="${port.links.changelogs}">Changelogs</a>
      </div>

      <!-- Ad slot: between the action buttons and the download list. -->
      <div class="ad-slot">AD SLOT — replace with your &lt;ins class="adsbygoogle"&gt; unit</div>

      <div class="section-label">Download Files</div>
      ${releaseGroup('Stable Releases', stableReleases)}
      ${releaseGroup('Pre-Release', preReleases)}
    `;
  }
</script>

</body>
</html>
